<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">OpenIPA network illustration</title>
  <desc id="desc">A static technical illustration of alarm signals moving across an IP network.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#10161d"/>
      <stop offset="45%" stop-color="#17222b"/>
      <stop offset="100%" stop-color="#0e1217"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#78a7c6" stop-opacity="0"/>
      <stop offset="45%" stop-color="#78a7c6" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ee8f34" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam2" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#ee8f34" stop-opacity="0"/>
      <stop offset="52%" stop-color="#ee8f34" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#78a7c6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ee8f34" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ee8f34" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#78a7c6" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#78a7c6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="tiny" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#9bb2c2" stroke-width="1">
    <path d="M0 130H1600"/>
    <path d="M0 255H1600"/>
    <path d="M0 380H1600"/>
    <path d="M0 505H1600"/>
    <path d="M0 630H1600"/>
    <path d="M0 755H1600"/>
    <path d="M0 880H1600"/>
    <path d="M150 0V1000"/>
    <path d="M350 0V1000"/>
    <path d="M550 0V1000"/>
    <path d="M750 0V1000"/>
    <path d="M950 0V1000"/>
    <path d="M1150 0V1000"/>
    <path d="M1350 0V1000"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M220 700C430 610 535 510 700 470C905 420 1000 475 1225 362C1320 315 1380 250 1490 210" stroke="url(#beam)" stroke-width="6"/>
    <path d="M260 268C390 315 510 355 670 320C850 280 1055 148 1280 180C1405 198 1470 246 1530 320" stroke="url(#beam2)" stroke-width="5"/>
    <path d="M350 830C530 770 600 720 785 720C975 720 1100 760 1335 675" stroke="url(#beam)" stroke-width="4"/>
  </g>

  <g opacity="0.9">
    <circle cx="220" cy="700" r="70" fill="url(#glowA)" filter="url(#soft)"/>
    <circle cx="700" cy="470" r="62" fill="url(#glowB)" filter="url(#soft)"/>
    <circle cx="1225" cy="362" r="70" fill="url(#glowA)" filter="url(#soft)"/>
    <circle cx="1490" cy="210" r="58" fill="url(#glowB)" filter="url(#soft)"/>
    <circle cx="260" cy="268" r="52" fill="url(#glowB)" filter="url(#soft)"/>
    <circle cx="1280" cy="180" r="62" fill="url(#glowA)" filter="url(#soft)"/>
  </g>

  <g>
