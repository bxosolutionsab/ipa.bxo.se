    <rect x="662" y="434" width="76" height="78" rx="6" fill="#121c25" stroke="#8fb3c8" stroke-opacity="0.55"/>
    <path d="M680 468H720" stroke="#78a7c6" stroke-width="4" stroke-linecap="round"/>
    <path d="M680 488H716" stroke="#ee8f34" stroke-width="4" stroke-linecap="round"/>

    <rect x="1160" y="298" width="132" height="132" rx="10" fill="#111820" stroke="#8a7d72" stroke-opacity="0.52"/>
    <path d="M1182 352H1272" stroke="#f1d6b7" stroke-opacity="0.6" stroke-width="6" stroke-linecap="round"/>
    <path d="M1227 322V398" stroke="#ee8f34" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1227" cy="360" r="24" fill="none" stroke="#78a7c6" stroke-width="4"/>

    <rect x="1434" y="158" width="92" height="110" rx="10" fill="#111820" stroke="#6e8899" stroke-opacity="0.55"/>
    <rect x="1454" y="178" width="52" height="70" rx="8" fill="#17242f" stroke="#8fb3c8" stroke-opacity="0.45"/>
    <circle cx="1480" cy="232" r="8" fill="#ee8f34"/>

    <rect x="210" y="210" width="104" height="108" rx="10" fill="#111820" stroke="#6e8899" stroke-opacity="0.55"/>
    <path d="M232 238H292" stroke="#78a7c6" stroke-width="4" stroke-linecap="round"/>
    <path d="M232 258H278" stroke="#ee8f34" stroke-width="4" stroke-linecap="round"/>
    <path d="M232 278H268" stroke="#f1d6b7" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g opacity="0.58">
    <circle cx="398" cy="622" r="5" fill="#78a7c6" filter="url(#tiny)"/>
    <circle cx="540" cy="538" r="5" fill="#ee8f34" filter="url(#tiny)"/>
    <circle cx="868" cy="435" r="5" fill="#78a7c6" filter="url(#tiny)"/>
    <circle cx="1035" cy="430" r="5" fill="#ee8f34" filter="url(#tiny)"/>
    <circle cx="1362" cy="292" r="5" fill="#78a7c6" filter="url(#tiny)"/>
    <circle cx="508" cy="328" r="5" fill="#78a7c6" filter="url(#tiny)"/>
    <circle cx="900" cy="240" r="5" fill="#ee8f34" filter="url(#tiny)"/>
    <circle cx="1110" cy="175" r="5" fill="#78a7c6" filter="url(#tiny)"/>
    <circle cx="1100" cy="758" r="5" fill="#ee8f34" filter="url(#tiny)"/>
  </g>
</svg>
